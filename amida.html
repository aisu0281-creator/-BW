<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>抽選ツール</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#1e3c72;
    color:white;
}

/* セクション */
section{
    background:white;
    color:#333;
    border-radius:10px;
    padding:20px;
    margin:20px auto;
    max-width:700px;
}

/* 入力タグ */
.tag{
    display:inline-block;
    background:#4CAF50;
    color:white;
    padding:5px 10px;
    border-radius:20px;
    margin:5px;
    cursor:pointer;
}
.tag:hover{background:red}

/* 結果 */
.result{
    font-size:26px;
    font-weight:bold;
    color:#ff5722;
}

/* ルーレット */
#wheel{
    width:300px;
    height:300px;
    border-radius:50%;
    margin:20px auto;
    border:5px solid #333;
    transition: transform 4s cubic-bezier(.2,.8,.2,1);
    position:relative;
    overflow:hidden;
}
.pointer{
    width:0;height:0;
    border-left:15px solid transparent;
    border-right:15px solid transparent;
    border-bottom:30px solid red;
    margin:auto;
}

/* あみだ */
canvas{
    background:white;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>🏆 抽選ツール</h1>

<!-- ===== ルーレット ===== -->
<section>
<h2>🎯 ルーレット</h2>

<input id="nameInput" placeholder="名前 Enter">
<button onclick="addName()">追加</button>
<button onclick="clearNames()">リセット</button>

<div id="nameList"></div>

<div class="pointer"></div>
<div id="wheel"></div>

<button onclick="spin()">🎯 回す</button>
<div id="result" class="result"></div>
</section>

<!-- ===== あみだ ===== -->
<section>
<h2>🎲 あみだくじ</h2>

<input id="amidaInput" placeholder="名前 Enter">
<button onclick="addAmida()">追加</button>
<button onclick="clearAmida()">リセット</button>

<div id="amidaList"></div>

<canvas id="amida" width="600" height="350"></canvas>
<p>↑ 名前クリック</p>

<div id="amidaResult" class="result"></div>
</section>

<script>
/* ===== ルーレット ===== */
let items=[],rotation=0;

function renderNames(){
    const list=document.getElementById("nameList");
    list.innerHTML="";
    items.forEach((n,i)=>{
        const span=document.createElement("span");
        span.className="tag";
        span.innerText=n;
        span.onclick=()=>{items.splice(i,1);renderNames();setupWheel();}
        list.appendChild(span);
    });
}

function addName(){
    const input=document.getElementById("nameInput");
    if(!input.value)return;
    items.push(input.value);
    input.value="";
    renderNames();
    setupWheel();
}

function clearNames(){
    items=[];
    renderNames();
    setupWheel();
}

document.getElementById("nameInput").addEventListener("keydown",e=>{
    if(e.key==="Enter") addName();
});

function setupWheel(){
    const wheel=document.getElementById("wheel");
    wheel.innerHTML="";
    if(items.length===0) return;

    const angle=360/items.length;

    items.forEach((n,i)=>{
        const div=document.createElement("div");
        div.style.position="absolute";
        div.style.width="50%";
        div.style.height="50%";
        div.style.transformOrigin="100% 100%";
        div.style.background=`hsl(${i*360/items.length},70%,60%)`;
        div.style.transform=`rotate(${i*angle}deg) skewY(${90-angle}deg)`;

        const text=document.createElement("div");
        text.innerText=n;
        text.style.position="absolute";
        text.style.left="100%";
        text.style.top="100%";
        text.style.fontSize="12px";

        div.appendChild(text);
        wheel.appendChild(div);
    });
}

function spin(){
    if(items.length===0)return;

    const angle=360/items.length;
    const index=Math.floor(Math.random()*items.length);

    const target=360-(index*angle)-angle/2;
    rotation+=360*5+target;

    const wheel=document.getElementById("wheel");
    wheel.style.transform=`rotate(${rotation}deg)`;

    // ★ 演出
    document.getElementById("result").innerText="回転中...";
    
    setTimeout(()=>{
        document.getElementById("result").innerText="🎉 "+items[index];
    },4000);
}

/* ===== あみだ ===== */
const canvas=document.getElementById("amida");
const ctx=canvas.getContext("2d");

let amidaNames=[],lines=[];
let cols,cw,rh;
const rows=6;

function renderAmida(){
    const list=document.getElementById("amidaList");
    list.innerHTML="";
    amidaNames.forEach((n,i)=>{
        const span=document.createElement("span");
        span.className="tag";
        span.innerText=n;
        span.onclick=()=>{amidaNames.splice(i,1);renderAmida();createAmida();}
        list.appendChild(span);
    });
}

function addAmida(){
    const input=document.getElementById("amidaInput");
    if(!input.value)return;
    amidaNames.push(input.value);
    input.value="";
    renderAmida();
    createAmida();
}

function clearAmida(){
    amidaNames=[];
    renderAmida();
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

document.getElementById("amidaInput").addEventListener("keydown",e=>{
    if(e.key==="Enter") addAmida();
});

function createAmida(){
    cols=amidaNames.length;
    if(cols===0)return;

    cw=canvas.width/(cols+1);
    rh=canvas.height/(rows+2);

    ctx.clearRect(0,0,canvas.width,canvas.height);
    lines=[];

    for(let i=0;i<cols;i++){
        ctx.fillText(amidaNames[i],(i+1)*cw,rh*0.7);
    }

    for(let i=1;i<=cols;i++){
        ctx.beginPath();
        ctx.moveTo(i*cw,rh);
        ctx.lineTo(i*cw,canvas.height-rh);
        ctx.stroke();
    }

    for(let r=1;r<rows;r++){
        for(let c=1;c<cols;c++){
            if(Math.random()<0.5){
                ctx.beginPath();
                ctx.moveTo(c*cw,(r+1)*rh);
                ctx.lineTo((c+1)*cw,(r+1)*rh);
                ctx.stroke();
                lines.push({r,c});
            }
        }
    }
}

canvas.addEventListener("click",(e)=>{
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const y=e.clientY-rect.top;

    if(y<rh){
        let pos=Math.round(x/cw);
        if(pos<1||pos>cols)return;

        createAmida();
        animateAmida(pos);
    }
});

function animateAmida(startPos){
    const path=[];
    let current=startPos;

    for(let r=1;r<rows;r++){
        let right=lines.find(l=>l.r===r&&l.c===current);
        let left=lines.find(l=>l.r===r&&l.c===current-1);

        if(right){
            path.push({type:"right",r,current});
            current++;
        } else if(left){
            path.push({type:"left",r,current});
            current--;
        }

        path.push({type:"down",r,current});
    }

    drawAnimation(startPos,path,current);
}

function drawAnimation(startPos,path,goal){
    let x=startPos*cw;
    let y=rh;
    let i=0;

    const interval=setInterval(()=>{
        if(i>=path.length){
            clearInterval(interval);
            document.getElementById("amidaResult").innerText =
                "🎉 "+amidaNames[startPos-1]+" → "+amidaNames[goal-1];
            return;
        }

        ctx.strokeStyle="red";
        ctx.lineWidth=3;

        const step=path[i];
        let nx=x, ny=y;

        if(step.type==="down") ny=(step.r+1)*rh;
        if(step.type==="right") nx=(step.current+1)*cw;
        if(step.type==="left") nx=(step.current-1)*cw;

        ctx.beginPath();
        ctx.moveTo(x,y);
        ctx.lineTo(nx,ny);
        ctx.stroke();

        x=nx; y=ny;
        i++;
    },150);
}
</script>

</body>
</html>
