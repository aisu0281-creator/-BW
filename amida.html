<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>抽選ツール</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#eee;
}

/* ===== レイアウト ===== */
.flex{
    display:flex;
    justify-content:center;
    gap:30px;
}

/* ===== ルーレット ===== */
#wheel{
    width:400px;
    height:400px;
    border-radius:50%;
    overflow:hidden;
    position:relative;
    border:5px solid #333;
    transition: transform 4s cubic-bezier(.2,.8,.2,1);
}

.centerText{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.6);
    color:white;
    padding:10px 20px;
    border-radius:10px;
}

.pointer{
    position:absolute;
    right:-10px;
    top:50%;
    transform:translateY(-50%);
    border-left:20px solid red;
    border-top:10px solid transparent;
    border-bottom:10px solid transparent;
}

/* ===== あみだ ===== */
canvas{
    background:white;
    margin-top:20px;
}

button{
    margin:5px;
    padding:6px 12px;
}
</style>
</head>

<body>

<h1>🎯 ルーレット</h1>

<button onclick="spin()">開始</button>
<button onclick="reset()">リセット</button>

<div class="flex">
    <div style="position:relative">
        <div id="wheel"></div>
        <div class="pointer"></div>
        <div class="centerText" id="centerText">クリックして回転</div>
    </div>

    <textarea id="list">1
2
3
4
5
6</textarea>
</div>

<hr>

<h2>🎲 あみだくじ</h2>

<input id="amidaInput" placeholder="参加者">
<button onclick="addAmida()">追加</button>

<input id="goalInput" placeholder="ゴール（例:1位,2位,ハズレ）">
<button onclick="setGoals()">ゴール設定</button>

<br><br>
<button onclick="createAmida()">作成</button>

<div id="topNames"></div>
<div id="goalList"></div>

<canvas id="amida" width="600" height="400"></canvas>

<p>↑ 作成後に名前ボタンでスタート</p>
<h3 id="amidaResult"></h3>

<script>
/* ===== ルーレット ===== */
let rotation=0;

function setupWheel(){
    const items=document.getElementById("list").value.split("\n").filter(v=>v);
    const wheel=document.getElementById("wheel");
    wheel.innerHTML="";

    const angle=360/items.length;

    items.forEach((n,i)=>{
        const slice=document.createElement("div");

        slice.style.position="absolute";
        slice.style.width="100%";
        slice.style.height="100%";
        slice.style.clipPath="polygon(50% 50%, 100% 0, 100% 100%)";
        slice.style.background=`hsl(${i*360/items.length},70%,70%)`;
        slice.style.transform=`rotate(${i*angle}deg)`;

        const text=document.createElement("div");
        text.innerText=n;
        text.style.position="absolute";
        text.style.left="70%";
        text.style.top="50%";
        text.style.transform="translate(-50%,-50%)";

        slice.appendChild(text);
        wheel.appendChild(slice);
    });
}

function spin(){
    const items=document.getElementById("list").value.split("\n").filter(v=>v);
    if(items.length===0)return;

    const index=Math.floor(Math.random()*items.length);
    const angle=360/items.length;
    const target=360-(index*angle)-angle/2;

    rotation+=360*5+target;
    document.getElementById("wheel").style.transform=`rotate(${rotation}deg)`;

    document.getElementById("centerText").innerText="回転中...";

    setTimeout(()=>{
        document.getElementById("centerText").innerText="🎉 "+items[index];
    },4000);
}

function reset(){
    rotation=0;
    document.getElementById("wheel").style.transform="rotate(0deg)";
    document.getElementById("centerText").innerText="クリックして回転";
}

setupWheel();
document.getElementById("list").addEventListener("input",setupWheel);

/* ===== あみだ ===== */
const canvas=document.getElementById("amida");
const ctx=canvas.getContext("2d");

let names=[];
let goals=[];
let lines=[];
const rows=8;

/* 名前追加 */
function addAmida(){
    const input=document.getElementById("amidaInput");
    if(!input.value)return;

    names.push(input.value);
    input.value="";
    renderNames();
}

/* ゴール設定 */
function setGoals(){
    goals=document.getElementById("goalInput").value.split(",");

    const div=document.getElementById("goalList");
    div.innerHTML="";
    goals.forEach(g=>{
        const span=document.createElement("span");
        span.innerText=g+" ";
        div.appendChild(span);
    });
}

/* 名前表示 */
function renderNames(){
    const div=document.getElementById("topNames");
    div.innerHTML="";

    names.forEach((n,i)=>{
        const btn=document.createElement("button");
        btn.innerText=n+" ▶";
        btn.onclick=()=>startAmida(i+1);
        div.appendChild(btn);
    });
}

/* 作成（ここで初めて線） */
function createAmida(){
    const cols=names.length;
    if(cols===0)return;

    const cw=canvas.width/(cols+1);
    const rh=canvas.height/(rows+1);

    ctx.clearRect(0,0,canvas.width,canvas.height);
    lines=[];

    ctx.textAlign="center";

    // 上（名前）
    for(let i=0;i<cols;i++){
        ctx.fillText(names[i],(i+1)*cw,15);
    }

    // 下（ゴール）
    for(let i=0;i<cols;i++){
        if(goals[i]){
            ctx.fillText(goals[i],(i+1)*cw,canvas.height-5);
        }
    }

    // 縦線
    for(let i=1;i<=cols;i++){
        ctx.beginPath();
        ctx.moveTo(i*cw,20);
        ctx.lineTo(i*cw,canvas.height-20);
        ctx.strokeStyle="#888";
        ctx.stroke();
    }

    // 横線
    for(let r=1;r<rows;r++){
        for(let c=1;c<cols;c++){
            if(Math.random()<0.5){
                ctx.beginPath();
                ctx.moveTo(c*cw,r*rh);
                ctx.lineTo((c+1)*cw,r*rh);
                ctx.stroke();
                lines.push({r,c});
            }
        }
    }
}

/* アニメーション */
function startAmida(start){
    let current=start;

    const cw=canvas.width/(names.length+1);
    const rh=canvas.height/(rows+1);

    let x=start*cw;
    let y=20;

    let path=[];

    for(let r=1;r<rows;r++){
        let right=lines.find(l=>l.r===r&&l.c===current);
        let left=lines.find(l=>l.r===r&&l.c===current-1);

        if(right){
            path.push({type:"right",r,current});
            current++;
        } else if(left){
            path.push({type:"left",r,current});
            current--;
        }

        path.push({type:"down",r,current});
    }

    let i=0;

    const interval=setInterval(()=>{
        if(i>=path.length){
            clearInterval(interval);

            document.getElementById("amidaResult").innerText =
                "🎉 "+names[start-1]+" → "+(goals[current-1]||current);
            return;
        }

        ctx.strokeStyle="red";
        ctx.lineWidth=3;

        let nx=x, ny=y;
        const step=path[i];

        if(step.type==="down") ny=(step.r)*rh;
        if(step.type==="right") nx=(step.current+1)*cw;
        if(step.type==="left") nx=(step.current-1)*cw;

        ctx.beginPath();
        ctx.moveTo(x,y);
        ctx.lineTo(nx,ny);
        ctx.stroke();

        x=nx;
        y=ny;

        i++;
    },120);
}
</script>

</body>
</html>
