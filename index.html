<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>大会ですよ</title>

<style>
/* 全体 */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.7;
    margin: 0;
    padding: 20px;
    padding-top: 70px;
    overflow-x: hidden;
    color: #fff;
    scroll-behavior: smooth;
}

/* 背景 */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("assets/images/dragon.png");
    background-size: cover;
    background-position: center;
    z-index: -2;
    animation: bgMove 40s ease-in-out infinite alternate;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

@keyframes bgMove {
    0% {background-position: center top; transform: scale(1);}
    100% {background-position: center bottom; transform: scale(1.1);}
}

/* ナビバー */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    box-sizing: border-box;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    color: white;
    z-index: 1000;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.nav-links a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

.nav-links a:hover {
    text-decoration: underline;
}

/* セクション */
section {
    background: linear-gradient(rgba(255,255,255,0.95), rgba(255,255,255,0.85));
    color: #333;
    border-radius: 10px;
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    opacity: 0;
    transform: translateY(20px);
    transition: 0.6s;
}

section.show {
    opacity: 1;
    transform: translateY(0);
}

h2 {
    border-bottom: 2px solid #aaa;
    padding-bottom: 8px;
}

h2::before {
    content: "・";
    margin-right: 8px;
}

/* スマホ対応 */
@media (max-width: 768px) {
    .nav-links a {
        margin-left: 10px;
        font-size: 14px;
    }
    section {
        padding: 15px;
    }
    h1 {
        font-size: 22px;
    }
}
</style>
</head>
<body>

<!-- ナビバー -->
<div class="navbar">
    <div class="logo">大会ページ</div>
    <div class="nav-links">
        <a href="#">ホーム</a>
        <a href="entry.html">エントリー</a>
        <a href="rules.html">ルール</a>
        <a href="faq.html">FAQ</a>
    </div>
</div>

<h1>◆大会用ページ◆</h1>

<!-- 大会概要 -->
<section>
    <h2>大会概要</h2>
        <ul>
            <li><strong>大会名:</strong> 第二回シャドバ大会 ○○杯</li>
            <li><strong>開催日時:</strong> 2026年3月23日 20:00</li>
            <li><strong>デッキ提出:</strong>試合前にデッキコード提出必須</li>
        </ul>
    
</section>

<!-- カウントダウン -->
<section>
    <h2>開催まであと</h2>
    <p id="countdown"></p>
</section>

<!-- お知らせ -->
<section>
    <h2>お知らせ</h2>
    <ul>
        <li>2025/03/01 エントリー開始</li>
        <li>2025/03/10 ルール更新</li>
    </ul>
</section>

<!-- 記事一覧 -->
<section>
    <h2>記事一覧</h2>
    <ul>
        <li><a href="entry.html">エントリー</a></li>
        <li><a href="rules.html">大会ルール</a></li>
        <li><a href="faq.html">よくある質問</a></li>
        <li><a href="UltimateCodePen.html">コーディング勉強用</a></li>
    </ul>
</section>

<script>
// カウントダウン
const targetDate = new Date(2026, 2, 23, 20, 0, 0); // 2026年3月23日20時

function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if(diff < 0){
        document.getElementById("countdown").textContent = "大会は終了しました";
        return;
    }

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor(diff / (1000*60*60) % 24);
    const m = Math.floor(diff / (1000*60) % 60);
    const s = Math.floor(diff / 1000 % 60);

    document.getElementById("countdown").textContent =
        `${d}日 ${h}時間 ${m}分 ${s}秒`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

// フェードイン
const sections = document.querySelectorAll('section');
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add('show');
            observer.unobserve(entry.target);
        }
    });
}, { threshold: 0.1 });

sections.forEach(sec => observer.observe(sec));
</script>

</body>
</html>
