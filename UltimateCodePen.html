<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate CodePen</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">

<!-- CodeMirror -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

<!-- Prettier -->
<script src="https://cdn.jsdelivr.net/npm/prettier@2.8.8/standalone.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prettier@2.8.8/parser-html.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prettier@2.8.8/parser-babel.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prettier@2.8.8/parser-postcss.js"></script>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:#1e1e1e;
    color:#fff;
    font-family:'Fira Code', monospace;
    display:flex;
    flex-direction:column;
}

.main{
    display:flex;
    height:100%;
}

/* 左 */
.left{
    width:50%;
    display:flex;
    flex-direction:column;
    overflow:auto;
}

/* 右 */
.right{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:auto;
    border-left:2px solid #333;
}

/* ドラッグ */
.divider{
    width:5px;
    background:#444;
    cursor:col-resize;
}

/* タブ */
.tabs{
    display:flex;
    background:#111;
}
.tab{
    padding:10px;
    cursor:pointer;
    color:#aaa;
}
.tab.active{
    background:#333;
    color:#fff;
}

/* エディタ */
.editor{
    flex:1;
    display:none;
}
.editor.active{
    display:block;
}

.CodeMirror{
    height:100%;
}

/* エラー */
#errorBox{
    height:50px;
    padding:5px;
    font-size:12px;
    background:#030;
    position:sticky;
    top:0;
}

/* iframe */
iframe{
    flex:1;
    border:none;
}

/* 縦 */
.vertical .main{
    flex-direction:column;
}
.vertical .divider{
    width:100%;
    height:5px;
    cursor:row-resize;
}

/* スマホ */
@media(max-width:768px){
    .main{flex-direction:column;}
    .divider{display:none;}
}
</style>
</head>

<body>

<div class="tabs">
    <div class="tab active" onclick="switchTab('html')">HTML</div>
    <div class="tab" onclick="switchTab('css')">CSS</div>
    <div class="tab" onclick="switchTab('js')">JS</div>
</div>

<div class="main">

<div class="left" id="left">
    <div id="html" class="editor active"></div>
    <div id="css" class="editor"></div>
    <div id="js" class="editor"></div>
</div>

<div class="divider" id="divider"></div>

<div class="right">
    <div id="errorBox">OK</div>
    <iframe id="preview"></iframe>
</div>

</div>

<script>
let htmlEditor, cssEditor, jsEditor;

window.onload = () => {

    htmlEditor = CodeMirror(document.getElementById("html"), {
        value:`<!DOCTYPE html>
<html>
<body>
<h1>Hello</h1>
</body>
</html>`,
        mode:"xml",
        theme:"material-darker",
        lineNumbers:true
    });

    cssEditor = CodeMirror(document.getElementById("css"), {
        value:"body{color:red;}",
        mode:"css",
        theme:"material-darker",
        lineNumbers:true
    });

    jsEditor = CodeMirror(document.getElementById("js"), {
        value:"console.log('OK');",
        mode:"javascript",
        theme:"material-darker",
        lineNumbers:true
    });

    update();

    htmlEditor.on("change", update);
    cssEditor.on("change", update);
    jsEditor.on("change", update);

    initResize();

    // ← 初期refresh
    setTimeout(()=>{
        htmlEditor.refresh();
        cssEditor.refresh();
        jsEditor.refresh();
    },100);
};

// タブ
function switchTab(tab){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".editor").forEach(e=>e.classList.remove("active"));

    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add("active");
    document.getElementById(tab).classList.add("active");

    // ← 超重要
    setTimeout(()=>{
        htmlEditor.refresh();
        cssEditor.refresh();
        jsEditor.refresh();
    },10);
}

// 実行
function update(){
    let html = htmlEditor.getValue();

    html = html.replace("</body>",
    `<style>${cssEditor.getValue()}</style>
<script>
window.onerror = msg=>parent.postMessage({type:"error",message:msg},"*");
try{${jsEditor.getValue()}}catch(e){parent.postMessage({type:"error",message:e.message},"*");}
<\/script></body>`);

    preview.srcdoc = html;

    errorBox.style.background="#030";
    errorBox.innerText="OK";
}

// エラー
window.addEventListener("message", e=>{
    if(e.data.type==="error"){
        errorBox.style.background="#300";
        errorBox.innerText="⚠ "+e.data.message;
    }
});

// リサイズ
function initResize(){
    const divider = document.getElementById("divider");
    const left = document.getElementById("left");
    let dragging=false;

    divider.addEventListener("mousedown",()=>dragging=true);
    window.addEventListener("mouseup",()=>dragging=false);

    window.addEventListener("mousemove",e=>{
        if(!dragging)return;
        left.style.width=e.clientX+"px";
    });
}
</script>

</body>
</html>
