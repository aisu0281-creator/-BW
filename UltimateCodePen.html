<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate CodePen</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">

<!-- CodeMirror -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

<!-- Prettier -->
<script src="https://cdn.jsdelivr.net/npm/prettier@2.8.8/standalone.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prettier@2.8.8/parser-html.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prettier@2.8.8/parser-babel.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prettier@2.8.8/parser-postcss.js"></script>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden; /* ← 全体スクロール禁止 */
    background:#1e1e1e;
    color:#fff;
    font-family:'Fira Code', monospace;
    display:flex;
    flex-direction:column;
}

/* レイアウト */
.main{
    display:flex;
    height:100%;
}

/* 左（エディタ） */
.left{
    width:50%;
    display:flex;
    flex-direction:column;
    min-width:150px;
    overflow:auto; /* ← 個別スクロール */
}

/* 右（プレビュー） */
.right{
    flex:1;
    display:flex;
    flex-direction:column;
    border-left:2px solid #333;
    overflow:auto; /* ← 個別スクロール */
}

/* ドラッグバー */
.divider{
    width:5px;
    background:#444;
    cursor:col-resize;
}

/* タブ */
.tabs{
    display:flex;
    background:#111;
}
.tab{
    padding:10px;
    cursor:pointer;
    color:#aaa;
}
.tab.active{
    background:#333;
    color:#fff;
}

/* ツールバー */
.toolbar{
    background:#111;
    padding:5px;
}
button{
    margin-right:8px;
}

/* エディタ */
.editor{
    flex:1;
    display:none;
}
.editor.active{
    display:block;
}

/* CodeMirror */
.CodeMirror{
    height:100%;
}

/* エラー */
#errorBox{
    height:50px;
    padding:5px;
    font-size:12px;
    background:#030;
    position:sticky;
    top:0;
}

/* プレビュー */
iframe{
    flex:1;
    background:#fff;
    border:none;
}

/* 縦モード */
.vertical .main{
    flex-direction:column;
}
.vertical .divider{
    height:5px;
    width:100%;
    cursor:row-resize;
}
.vertical .right{
    border-left:none;
    border-top:2px solid #333;
}

/* スマホ */
@media (max-width:768px){
    .main{
        flex-direction:column;
    }
    .divider{
        display:none;
    }
}
</style>
</head>

<body>

<div class="toolbar">
    <button onclick="toggleLayout()">縦/横</button>
    <button onclick="formatCode()">整形</button>
    <button onclick="downloadHTML()">DL</button>
    <button onclick="goHome()">HOME</button>
</div>

<div class="main">

    <div class="left" id="left">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('html')">HTML</div>
            <div class="tab" onclick="switchTab('css')">CSS</div>
            <div class="tab" onclick="switchTab('js')">JS</div>
        </div>

        <div id="html" class="editor active"></div>
        <div id="css" class="editor"></div>
        <div id="js" class="editor"></div>
    </div>

    <div class="divider" id="divider"></div>

    <div class="right">
        <div id="errorBox">OK</div>
        <iframe id="preview"></iframe>
    </div>

</div>

<script>
let htmlEditor, cssEditor, jsEditor;

// 初期化
window.onload = () => {
    htmlEditor = CodeMirror(document.getElementById("html"), {
        value:`<!DOCTYPE html>
<html>
<body>
<h1>Hello</h1>
</body>
</html>`,
        mode:"xml",
        theme:"material-darker",
        lineNumbers:true
    });

    cssEditor = CodeMirror(document.getElementById("css"), {
        value:"body{color:red;}",
        mode:"css",
        theme:"material-darker",
        lineNumbers:true
    });

    jsEditor = CodeMirror(document.getElementById("js"), {
        value:"console.log('OK');",
        mode:"javascript",
        theme:"material-darker",
        lineNumbers:true
    });

    load();
    update();

    htmlEditor.on("change", update);
    cssEditor.on("change", update);
    jsEditor.on("change", update);

    initResize();
};

// 実行
function update(){
    let html = htmlEditor.getValue();

    html = html.replace("</body>",
    `<style>${cssEditor.getValue()}</style>
<script>
window.onerror = msg=>parent.postMessage({type:"error",message:msg},"*");
try{${jsEditor.getValue()}}catch(e){parent.postMessage({type:"error",message:e.message},"*");}
<\/script></body>`);

    preview.srcdoc = html;

    const box = document.getElementById("errorBox");
    box.style.background="#030";
    box.innerText="OK";

    save();
}

// エラー
window.addEventListener("message", e=>{
    if(e.data.type==="error"){
        const box=document.getElementById("errorBox");
        box.style.background="#300";
        box.innerText="⚠ "+e.data.message;
    }
});

// リサイズ
function initResize(){
    const divider = document.getElementById("divider");
    const left = document.getElementById("left");

    let dragging=false;

    divider.addEventListener("mousedown",()=>dragging=true);
    window.addEventListener("mouseup",()=>dragging=false);

    window.addEventListener("mousemove",e=>{
        if(!dragging) return;

        if(document.body.classList.contains("vertical")){
            left.style.height = e.clientY + "px";
        }else{
            left.style.width = e.clientX + "px";
        }
    });
}

// 縦横切替
function toggleLayout(){
    document.body.classList.toggle("vertical");
}

// タブ
function switchTab(tab){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".editor").forEach(e=>e.classList.remove("active"));

    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add("active");
    document.getElementById(tab).classList.add("active");
}

// 保存
function save(){
    localStorage.setItem("html", htmlEditor.getValue());
    localStorage.setItem("css", cssEditor.getValue());
    localStorage.setItem("js", jsEditor.getValue());
}

// 読み込み
function load(){
    if(localStorage.getItem("html")){
        htmlEditor.setValue(localStorage.getItem("html"));
        cssEditor.setValue(localStorage.getItem("css"));
        jsEditor.setValue(localStorage.getItem("js"));
    }
}

// ダウンロード
function downloadHTML(){
    const content = htmlEditor.getValue().replace("</body>",
    `<style>${cssEditor.getValue()}</style>
<script>${jsEditor.getValue()}<\/script></body>`);

    const blob = new Blob([content], {type:"text/html"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download="index.html";
    a.click();
}

// 整形
function formatCode(){
    htmlEditor.setValue(prettier.format(htmlEditor.getValue(), {parser:"html", plugins:prettierPlugins}));
    cssEditor.setValue(prettier.format(cssEditor.getValue(), {parser:"css", plugins:prettierPlugins}));
    jsEditor.setValue(prettier.format(jsEditor.getValue(), {parser:"babel", plugins:prettierPlugins}));
}

// HOME
function goHome(){
    location.href="index.html";
}
</script>

</body>
</html>
