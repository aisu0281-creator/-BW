<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate CodePen</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">

<!-- Prettier -->
<script src="https://cdn.jsdelivr.net/npm/prettier@2.8.8/standalone.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prettier@2.8.8/parser-html.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prettier@2.8.8/parser-babel.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prettier@2.8.8/parser-postcss.js"></script>

<style>
body{
    margin:0;
    font-family:'Fira Code', monospace;
    background:#1e1e1e;
    color:#fff;
    display:flex;
    flex-direction:column;
    height:100vh;
}

.tabs{
    display:flex;
    background:#111;
}
.tab{
    padding:10px 20px;
    cursor:pointer;
    color:#aaa;
}
.tab.active{
    background:#333;
    color:#fff;
}

.toolbar{
    background:#111;
    padding:5px;
}

button{
    margin-right:10px;
}

/* エディタ */
.editor{
    flex:1;
    display:none;
    position:relative;
}
.editor.active{
    display:block;
}

.lineNumbers{
    position:absolute;
    left:0;
    top:0;
    width:40px;
    background:#111;
    color:#666;
    text-align:right;
    padding-right:5px;
    font-size:12px;
}

textarea{
    width:100%;
    height:100%;
    padding-left:50px;
    background:#1e1e1e;
    color:#fff;
    border:none;
    resize:none;
}

/* エラー表示 */
#errorBox{
    background:#030;
    color:#9f9;
    padding:5px;
    font-size:12px;
    height:60px;
    overflow:auto;
}

/* プレビュー */
iframe{
    height:35%;
    border:none;
    background:#fff;
}
</style>
</head>

<body>

<div class="tabs">
    <div class="tab active" onclick="switchTab('html')">HTML</div>
    <div class="tab" onclick="switchTab('css')">CSS</div>
    <div class="tab" onclick="switchTab('js')">JS</div>
</div>

<div class="toolbar">
    <button onclick="formatCode()">整形</button>
    <button onclick="downloadHTML()">ダウンロード</button>
</div>

<!-- HTML -->
<div id="html" class="editor active">
<div class="lineNumbers" id="htmlLines"></div>
<textarea id="htmlCode"><h1>Hello World</h1></textarea>
</div>

<!-- CSS -->
<div id="css" class="editor">
<div class="lineNumbers" id="cssLines"></div>
<textarea id="cssCode">body{color:red;}</textarea>
</div>

<!-- JS -->
<div id="js" class="editor">
<div class="lineNumbers" id="jsLines"></div>
<textarea id="jsCode">console.log("OK");</textarea>
</div>

<!-- エラー表示 -->
<div id="errorBox">OK</div>

<!-- プレビュー -->
<iframe id="preview"></iframe>

<script>
const htmlCode = document.getElementById("htmlCode");
const cssCode = document.getElementById("cssCode");
const jsCode = document.getElementById("jsCode");
const preview = document.getElementById("preview");

// タブ切り替え
function switchTab(tab){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".editor").forEach(e=>e.classList.remove("active"));

    document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add("active");
    document.getElementById(tab).classList.add("active");
}

// 更新
function update(){
    const errorBox = document.getElementById("errorBox");

    const html = htmlCode.value;
    const css = "<style>" + cssCode.value + "</style>";

    const js = `
    <script>
    window.onerror = function(msg, url, line){
        parent.postMessage({
            type:"error",
            message: msg + " (Line:" + line + ")"
        }, "*");
    };

    try{
        ${jsCode.value}
    }catch(e){
        parent.postMessage({
            type:"error",
            message: e.message
        }, "*");
    }
    <\/script>`;

    preview.srcdoc = html + css + js;

    save();
    updateLines();

    errorBox.style.background = "#030";
    errorBox.innerText = "OK";
}

// エラー受信
window.addEventListener("message", function(e){
    if(e.data.type === "error"){
        const errorBox = document.getElementById("errorBox");
        errorBox.style.background = "#300";
        errorBox.innerText = "⚠ " + e.data.message;
    }
});

// 保存
function save(){
    localStorage.setItem("html", htmlCode.value);
    localStorage.setItem("css", cssCode.value);
    localStorage.setItem("js", jsCode.value);
}

// 読み込み
function load(){
    htmlCode.value = localStorage.getItem("html") || "";
    cssCode.value = localStorage.getItem("css") || "";
    jsCode.value = localStorage.getItem("js") || "";
}

// 行番号
function updateLines(){
    setLines(htmlCode, "htmlLines");
    setLines(cssCode, "cssLines");
    setLines(jsCode, "jsLines");
}

function setLines(textarea, id){
    const lines = textarea.value.split("\n").length;
    let content = "";
    for(let i=1;i<=lines;i++){
        content += i + "<br>";
    }
    document.getElementById(id).innerHTML = content;
}

// ダウンロード
function downloadHTML(){
    const content = `
<!DOCTYPE html>
<html>
<head>
<style>
${cssCode.value}
</style>
</head>
<body>
${htmlCode.value}
<script>
${jsCode.value}
<\/script>
</body>
</html>`;

    const blob = new Blob([content], {type:"text/html"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "index.html";
    a.click();
}

// 整形
function formatCode(){
    htmlCode.value = prettier.format(htmlCode.value, {parser:"html", plugins:prettierPlugins});
    cssCode.value = prettier.format(cssCode.value, {parser:"css", plugins:prettierPlugins});
    jsCode.value = prettier.format(jsCode.value, {parser:"babel", plugins:prettierPlugins});
    update();
}

// リアルタイム更新
htmlCode.addEventListener("input", update);
cssCode.addEventListener("input", update);
jsCode.addEventListener("input", update);

// 初期化
load();
update();
</script>

</body>
</html>
