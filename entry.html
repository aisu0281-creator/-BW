<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>大会エントリー</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Noto Sans JP','Segoe UI',sans-serif;
    background:#f8f9fa;
    margin:0;
    padding:20px;
}

h1{text-align:center;color:#2c3e50;}
h2{color:#1a5a96;border-bottom:3px solid #2980b9;padding-bottom:8px;}

.section{
    background:#fff;
    padding:25px;
    border-radius:10px;
    margin-bottom:30px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.form-row{
    display:flex;
    margin-bottom:15px;
}

.form-row label{
    width:120px;
    font-weight:600;
}

.form-row input{
    flex:1;
    padding:8px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    padding:10px 20px;
    background:#2980b9;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
}

button:hover{background:#1f6391;}

.delete-btn{
    background:#e74c3c;
    padding:6px 12px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border-bottom:1px solid #ddd;
    padding:8px;
    text-align:center;
}

th{background:#f1f3f5;}

select{
    padding:4px;
}
</style>
</head>
<body>

<h1>◆大会エントリー＆リーグ管理</h1>

<div class="section">
<h2>現在の参加人数：<span id="count">0</span>人</h2>
<button onclick="createLeague()">ランダムリーグ生成</button>
</div>

<div class="section">
<h2>エントリーフォーム</h2>

<form id="form">
<div class="form-row">
<label>名前：</label><input id="name" required>
</div>
<div class="form-row">
<label>ゲームID：</label><input id="gameid" required>
</div>
<div class="form-row">
<label>Discord：</label><input id="discord" required>
</div>
<div class="form-row">
<label>コメント：</label><input id="comment">
</div>
<button type="submit">エントリーする</button>
</form>
</div>

<div class="section">
<h2>参加者一覧</h2>
<table>
<thead>
<tr>
<th>名前</th>
<th>ゲームID</th>
<th>Discord</th>
<th>コメント</th>
<th>削除</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<div class="section">
<h2>リーグ戦（勝敗入力）</h2>
<div id="leagueArea"></div>
<div id="rankingArea"></div>
</div>

<script>
const sheetURL="ここにあなたのsheetURL";
const formURL="ここにあなたのformURL";
const entryName="entry.515437798";
const entryGame="entry.387215603";
const entryDiscord="entry.1564981895";
const entryComment="entry.1417704571";
const deleteFlagEntry="entry.735085751";

let currentPlayers=[];
let matchResults={};

async function fetchData(){
    const res=await fetch(sheetURL);
    const text=await res.text();
    const rows=text.trim().split("\n");

    const tbody=document.getElementById("list");
    tbody.innerHTML="";
    currentPlayers=[];

    let count=0;

    rows.slice(1).reverse().forEach(row=>{
        const cols=row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g)||[];
        if(cols[5]?.replace(/"/g,"")==="削除済み") return;

        count++;
        const name=cols[1]?.replace(/"/g,"")||"";
        currentPlayers.push(name);

        const tr=document.createElement("tr");

        for(let i=1;i<=4;i++){
            const td=document.createElement("td");
            td.textContent=cols[i]?.replace(/"/g,"")||"";
            tr.appendChild(td);
        }

        const delTd=document.createElement("td");
        const btn=document.createElement("button");
        btn.textContent="削除";
        btn.className="delete-btn";
        btn.onclick=()=>deleteEntry(
            cols[1]?.replace(/"/g,""),
            cols[2]?.replace(/"/g,""),
            cols[3]?.replace(/"/g,""),
            cols[4]?.replace(/"/g,"")
        );
        delTd.appendChild(btn);
        tr.appendChild(delTd);

        tbody.appendChild(tr);
    });

    document.getElementById("count").textContent=count;
}

document.getElementById("form").addEventListener("submit",async e=>{
    e.preventDefault();
    const data=new FormData();
    data.append(entryName,name.value);
    data.append(entryGame,gameid.value);
    data.append(entryDiscord,discord.value);
    data.append(entryComment,comment.value);

    await fetch(formURL,{method:"POST",mode:"no-cors",body:data});
    alert("エントリー完了！");
    form.reset();
    setTimeout(fetchData,1000);
});

async function deleteEntry(name,game,discord,comment){
    if(!confirm("削除しますか？")) return;

    const data=new FormData();
    data.append(entryName,name);
    data.append(entryGame,game);
    data.append(entryDiscord,discord);
    data.append(entryComment,comment);
    data.append(deleteFlagEntry,"削除済み");

    await fetch(formURL,{method:"POST",mode:"no-cors",body:data});
    alert("削除しました");
    setTimeout(fetchData,1000);
}

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function createLeague(){
    if(currentPlayers.length<2){
        alert("2人以上必要です");
        return;
    }

    let players=[...currentPlayers];
    shuffle(players);
    matchResults={};

    let html="<table><tr><th></th>";
    players.forEach(p=>html+="<th>"+p+"</th>");
    html+="</tr>";

    for(let i=0;i<players.length;i++){
        html+="<tr><th>"+players[i]+"</th>";
        for(let j=0;j<players.length;j++){
            if(i===j){
                html+="<td>—</td>";
            }else if(i<j){
                html+=`<td>
                <select onchange="setResult('${players[i]}','${players[j]}',this.value)">
                <option value="">未</option>
                <option value="1">○</option>
                <option value="0">△</option>
                <option value="-1">●</option>
                </select></td>`;
            }else{
                html+="<td></td>";
            }
        }
        html+="</tr>";
    }
    html+="</table>";
    leagueArea.innerHTML=html;
    updateRanking(players);
}

function setResult(p1,p2,val){
    matchResults[p1+"_"+p2]=parseInt(val);
    matchResults[p2+"_"+p1]=-parseInt(val);
    updateRanking(currentPlayers);
}

function updateRanking(players){
    let scores={};
    players.forEach(p=>{
        scores[p]={point:0,win:0,draw:0,lose:0};
    });

    for(let key in matchResults){
        const [p1,p2]=key.split("_");
        const r=matchResults[key];
        if(r===1){scores[p1].point+=3;scores[p1].win++;}
        if(r===0){scores[p1].point+=1;scores[p1].draw++;}
        if(r===-1){scores[p1].lose++;}
    }

    let ranking=Object.entries(scores)
        .sort((a,b)=>b[1].point-a[1].point);

    let html="<h3>順位表</h3><table>";
    html+="<tr><th>順位</th><th>名前</th><th>勝</th><th>分</th><th>負</th><th>勝点</th></tr>";

    ranking.forEach((r,i)=>{
        html+=`<tr>
        <td>${i+1}</td>
        <td>${r[0]}</td>
        <td>${r[1].win}</td>
        <td>${r[1].draw}</td>
        <td>${r[1].lose}</td>
        <td>${r[1].point}</td>
        </tr>`;
    });

    html+="</table>";
    rankingArea.innerHTML=html;
}

fetchData();
</script>

</body>
</html>
