<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>大会エントリー</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.7;
    background-color: #f8f9fa;
    color: #333;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
}

h1 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 30px;
}

h2 {
    color: #1a5a96;
    margin-top: 0;
    padding-bottom: 8px;
    border-bottom: 3px solid #2980b9;
    margin-bottom: 20px;
}

.section-container {
    background-color: #ffffff;
    border: 1px solid #dee2e6;
    border-radius: 10px;
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
}

.section-container:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
}

/* フォーム横並び */
.form-row {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
}

.form-row label {
    width: 120px;
    font-weight: bold;
}

.form-row input {
    flex: 1;
    max-width: 400px;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

/* ボタン */
button {
    padding: 10px 20px;
    background-color: #2980b9;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background-color: #1f6391;
}

.delete-btn {
    background-color: #e74c3c;
    padding: 6px 12px;
}

.delete-btn:hover {
    background-color: #c0392b;
}

/* テーブル */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: left;
}

th {
    background-color: #f1f3f5;
}
</style>
</head>

<body>

<h1>◆大会エントリー</h1>

<div class="section-container">
<h2>現在の参加人数：<span id="count">0</span>人</h2>
</div>

<div class="section-container">
<h2>エントリーフォーム</h2>

<form id="form">

<div class="form-row">
<label>名前：</label>
<input id="name" required>
</div>

<div class="form-row">
<label>ゲームID：</label>
<input id="gameid" required>
</div>

<div class="form-row">
<label>Discord：</label>
<input id="discord" required>
</div>

<div class="form-row">
<label>コメント：</label>
<input id="comment">
</div>

<button type="submit">エントリーする</button>

</form>
</div>

<div class="section-container">
<h2>参加者一覧</h2>

<table>
<thead>
<tr>
<th>名前</th>
<th>ゲームID</th>
<th>Discord</th>
<th>コメント</th>
<th>削除</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<script>
const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTHixiOhC6gzmJ3AEKZcCLpViLYrHVnmhYVWcx7jFE2vFPumU2JlYxeOTaK961qDY-pIZ0astOepA7-/pub?output=csv";

const formURL =
"https://docs.google.com/forms/d/e/1FAIpQLSc7UaaqyKeuFvl8aKLzBthW9TH4SFIpds0GsrUiDRKcf3G97g/formResponse";

const entryName = "entry.515437798";
const entryGame = "entry.387215603";
const entryDiscord = "entry.1564981895";
const entryComment = "entry.1417704571";
const deleteFlagEntry = "entry.735085751";

async function fetchData(){
    const res = await fetch(sheetURL);
    const text = await res.text();
    const rows = text.trim().split("\n");

    const tbody = document.getElementById("list");
    tbody.innerHTML = "";

    let count = 0;

    rows.slice(1).reverse().forEach(row=>{
        const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
        if(cols[5]?.replace(/"/g,"") === "削除済み") return;

        count++;

        const tr = document.createElement("tr");

        for(let i=1;i<=4;i++){
            const td = document.createElement("td");
            td.textContent = cols[i]?.replace(/"/g,"") || "";
            tr.appendChild(td);
        }

        const deleteTd = document.createElement("td");
        const btn = document.createElement("button");
        btn.textContent="削除";
        btn.className="delete-btn";
        btn.onclick=()=>deleteEntry(
            cols[1]?.replace(/"/g,""),
            cols[2]?.replace(/"/g,""),
            cols[3]?.replace(/"/g,""),
            cols[4]?.replace(/"/g,"")
        );

        deleteTd.appendChild(btn);
        tr.appendChild(deleteTd);
        tbody.appendChild(tr);
    });

    document.getElementById("count").textContent=count;
}

document.getElementById("form").addEventListener("submit",async e=>{
    e.preventDefault();

    const data=new FormData();
    data.append(entryName,name.value);
    data.append(entryGame,gameid.value);
    data.append(entryDiscord,discord.value);
    data.append(entryComment,comment.value);

    await fetch(formURL,{method:"POST",mode:"no-cors",body:data});

    alert("エントリー完了！");
    form.reset();
    setTimeout(fetchData,1000);
});

async function deleteEntry(name,game,discord,comment){
    if(!confirm("削除しますか？")) return;

    const data=new FormData();
    data.append(entryName,name);
    data.append(entryGame,game);
    data.append(entryDiscord,discord);
    data.append(entryComment,comment);
    data.append(deleteFlagEntry,"削除済み");

    await fetch(formURL,{method:"POST",mode:"no-cors",body:data});

    alert("削除しました");
    setTimeout(fetchData,1000);
}

fetchData();
</script>

</body>
</html>
