<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>大会エントリー＆リーグ管理</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Noto Sans JP','Segoe UI',sans-serif;
    background:#f8f9fa;
    margin:0;
    padding:20px;
}
h1{text-align:center;color:#2c3e50;}
h2{color:#1a5a96;border-bottom:3px solid #2980b9;padding-bottom:8px;}
.section{
    background:#fff;
    padding:25px;
    border-radius:10px;
    margin-bottom:30px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}
.form-row{display:flex;margin-bottom:15px;}
.form-row label{width:120px;font-weight:600;}
.form-row input{
    flex:1;padding:8px;
    border:1px solid #ccc;
    border-radius:6px;
}
button{
    padding:10px 20px;
    background:#2980b9;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
}
button:hover{background:#1f6391;}
.delete-btn{background:#e74c3c;padding:6px 12px;}
table{width:100%;border-collapse:collapse;}
th,td{
    border-bottom:1px solid #ddd;
    padding:8px;
    text-align:center;
}
th{background:#f1f3f5;}
input.score{
    width:60px;
    text-align:center;
}
/* ホームボタン */
.home-btn{
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 10px 15px;
    background-color: #4CAF50;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    z-index: 999;
}
.home-btn:hover{
    background-color: #45a049;
}
</style>
</head>
<body>

<a href="index.html" class="home-btn">ホームに戻る</a>

<h1>◆大会エントリー＆リーグ管理</h1>

<div class="section">
<h2>現在の参加人数：<span id="count">0</span>人</h2>
<button onclick="createLeague()">ランダムリーグ生成</button>
<button onclick="resetLeague()">リーグリセット</button>
</div>

<div class="section">
<h2>エントリーフォーム</h2>
<form id="form">
<div class="form-row"><label>名前：</label><input id="name" required></div>
<div class="form-row"><label>ゲームID：</label><input id="gameid" required></div>
<div class="form-row"><label>Discord：</label><input id="discord" required></div>
<div class="form-row"><label>コメント：</label><input id="comment"></div>
<button type="submit">エントリーする</button>
</form>
</div>

<div class="section">
<h2>参加者一覧</h2>
<table>
<thead>
<tr>
<th>名前</th>
<th>ゲームID</th>
<th>Discord</th>
<th>コメント</th>
<th>削除</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<div class="section">
<h2>リーグ戦（スコア入力可）</h2>
<div id="leagueArea"></div>
<div id="rankingArea"></div>
</div>

<script>
/* ====== Google連携（空欄でもローカル保存可） ====== */
const sheetURL="assets/data/entry.csv"; // スプレッドシートCSV URL
const formURL="https://docs.google.com/forms/d/1LoUFMI_n6NqM_3itAZ_ts9jRODJSoqnX6Vfdqm6fmHo/formResponse";  // Googleフォーム送信URL
const entryName="entry.515437798";
const entryGame="entry.387215603";
const entryDiscord="entry.1564981895";
const entryComment="entry.1417704571";
const deleteFlagEntry="entry.735085751";

/* ====== 変数 ====== */
let currentPlayers=[];
let leaguePlayers=[];
let matchResults={};

/* ====== データ取得 ====== */
async function fetchData(){
    const tbody=document.getElementById("list");
    tbody.innerHTML="";
    currentPlayers=[];

    if(sheetURL){
        try{
            const res=await fetch(sheetURL);
            const text=await res.text();
            const rows=text.trim().split("\n");
            rows.slice(1).reverse().forEach(row=>{
                const cols=row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g)||[];
                if(cols[5]?.replace(/"/g,"")==="削除済み") return;
                const name=cols[1]?.replace(/"/g,"")||"";
                currentPlayers.push({name:name, game:cols[2], discord:cols[3], comment:cols[4]});
            });
        }catch(e){console.warn("スプレッドシート読み込み失敗",e);}
    }

    // ローカルリストに反映
    currentPlayers.forEach(p=>{
        const tr=document.createElement("tr");
        tr.innerHTML=`
            <td>${p.name}</td>
            <td>${p.game||""}</td>
            <td>${p.discord||""}</td>
            <td>${p.comment||""}</td>
            <td><button class="delete-btn" onclick='deleteLocal("${p.name}")'>削除</button></td>
        `;
        tbody.appendChild(tr);
    });
    document.getElementById("count").textContent=currentPlayers.length;
}

document.getElementById("form").addEventListener("submit",async e=>{
    e.preventDefault();
    const name=document.getElementById("name").value;
    const game=document.getElementById("gameid").value;
    const discord=document.getElementById("discord").value;
    const comment=document.getElementById("comment").value;

    // Googleフォーム送信
    if(formURL){
        const data=new FormData();
        data.append(entryName,name);
        data.append(entryGame,game);
        data.append(entryDiscord,discord);
        data.append(entryComment,comment);
        await fetch(formURL,{method:"POST",mode:"no-cors",body:data});
    }

    // ローカル保存
    currentPlayers.push({name:name, game:game, discord:discord, comment:comment});
    savePlayers();
    form.reset();
    fetchData();
});

function deleteLocal(name){
    if(!confirm("削除しますか？")) return;
    currentPlayers=currentPlayers.filter(p=>p.name!==name);
    savePlayers();
    fetchData();
}

function savePlayers(){
    localStorage.setItem("players", JSON.stringify(currentPlayers));
}

function loadPlayers(){
    const data=localStorage.getItem("players");
    if(data) currentPlayers=JSON.parse(data);
}

/* ====== リーグ ====== */
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function createLeague(){
    if(currentPlayers.length<2){alert("2人以上必要です"); return;}
    leaguePlayers=currentPlayers.map(p=>p.name);
    shuffle(leaguePlayers);
    matchResults={};
    saveLeague();
    renderLeague();
    updateRanking();
}

function renderLeague(){
    let html="<table><tr><th></th>";
    leaguePlayers.forEach(p=>html+="<th>"+p+"</th>");
    html+="</tr>";
    for(let i=0;i<leaguePlayers.length;i++){
        html+="<tr><th>"+leaguePlayers[i]+"</th>";
        for(let j=0;j<leaguePlayers.length;j++){
            if(i===j) html+="<td>—</td>";
            else if(i<j){
                const key=leaguePlayers[i]+"_"+leaguePlayers[j];
                const val=matchResults[key]||"";
                html+=`<td><input class="score" value="${val}" placeholder="2-1" onchange="setScore('${leaguePlayers[i]}','${leaguePlayers[j]}',this.value)"></td>`;
            } else html+="<td></td>";
        }
        html+="</tr>";
    }
    html+="</table>";
    document.getElementById("leagueArea").innerHTML=html;
}

function setScore(p1,p2,val){
    if(!/^\d+-\d+$/.test(val)){alert("2-1形式で入力してください"); return;}
    matchResults[p1+"_"+p2]=val;
    saveLeague();
    updateRanking();
}

function updateRanking(){
    let stats={};
    leaguePlayers.forEach(p=>{stats[p]={point:0,win:0,draw:0,lose:0,scored:0,conceded:0};});
    for(let key in matchResults){
        const [p1,p2]=key.split("_");
        const [s1,s2]=matchResults[key].split("-").map(Number);
        stats[p1].scored+=s1; stats[p1].conceded+=s2;
        stats[p2].scored+=s2; stats[p2].conceded+=s1;
        if(s1>s2){stats[p1].point+=3;stats[p1].win++;stats[p2].lose++;}
        else if(s1<s2){stats[p2].point+=3;stats[p2].win++;stats[p1].lose++;}
        else{stats[p1].point++;stats[p2].point++;stats[p1].draw++;stats[p2].draw++;}
    }
    let ranking=Object.entries(stats).sort((a,b)=>{
        if(b[1].point!==a[1].point) return b[1].point-a[1].point;
        const diffA=a[1].scored-a[1].conceded;
        const diffB=b[1].scored-b[1].conceded;
        if(diffB!==diffA) return diffB-diffA;
        return b[1].scored-a[1].scored;
    });
    let html="<h3>順位表</h3><table>";
    html+="<tr><th>順位</th><th>名前</th><th>勝</th><th>分</th><th>負</th><th>得</th><th>失</th><th>得失差</th><th>勝点</th></tr>";
    ranking.forEach((r,i)=>{
        const diff=r[1].scored-r[1].conceded;
        html+=`<tr><td>${i+1}</td><td>${r[0]}</td><td>${r[1].win}</td><td>${r[1].draw}</td><td>${r[1].lose}</td><td>${r[1].scored}</td><td>${r[1].conceded}</td><td>${diff}</td><td>${r[1].point}</td></tr>`;
    });
    html+="</table>";
    document.getElementById("rankingArea").innerHTML=html;
}

/* ====== 保存・復元 ====== */
function saveLeague(){
    localStorage.setItem("leaguePlayers",JSON.stringify(leaguePlayers));
    localStorage.setItem("matchResults",JSON.stringify(matchResults));
}

function loadLeague(){
    const p=localStorage.getItem("leaguePlayers");
    const r=localStorage.getItem("matchResults");
    if(p){
        leaguePlayers=JSON.parse(p);
        matchResults=JSON.parse(r)||{};
        renderLeague();
        updateRanking();
    }
}

function resetLeague(){
    localStorage.removeItem("leaguePlayers");
    localStorage.removeItem("matchResults");
    leaguePlayers=[]; matchResults={};
    document.getElementById("leagueArea").innerHTML="";
    document.getElementById("rankingArea").innerHTML="";
}

/* ====== 初期ロード ====== */
window.addEventListener("load",()=>{
    loadPlayers();
    fetchData();
    loadLeague();
});
</script>

</body>
</html>
