<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>大会エントリー</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.7;
    background-color: #f8f9fa;
    color: #333;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
}

h1 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 30px;
}

h2 {
    color: #1a5a96;
    margin-top: 0;
    padding-bottom: 8px;
    border-bottom: 3px solid #2980b9;
    margin-bottom: 20px;
}

.section-container {
    background-color: #ffffff;
    border: 1px solid #dee2e6;
    border-radius: 10px;
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
}

.section-container:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
}

.home-btn{
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 10px 15px;
    background-color: #4CAF50;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

.home-btn:hover{
    background-color: #45a049;
}

input {
    padding: 8px;
    width: 100%;
    max-width: 400px;
    border: 1px solid #ccc;
    border-radius: 6px;
    margin-bottom: 15px;
}

button {
    padding: 10px 20px;
    background-color: #2980b9;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background-color: #1f6391;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: left;
}

th {
    background-color: #f1f3f5;
}

</style>
</head>

<body>

<a href="index.html" class="home-btn">ホームに戻る</a>

<h1>◆大会エントリー</h1>

<div class="section-container">
<h2>現在の参加人数：<span id="count">0</span>人</h2>
</div>

<div class="section-container">
<h2>エントリーフォーム</h2>

<form id="form" onsubmit="sendEntry(event)">

<div class="form-row">
<label>名前：</label>
<input id="name" required>
</div>

<div class="form-row">
<label>ゲームID：</label>
<input id="gameid" required>
</div>

<div class="form-row">
<label>Discord：</label>
<input id="discord" required>
</div>

<div class="form-row">
<label>コメント：</label>
<input id="comment">
</div>

<button type="submit">エントリーする</button>

</form>
</div>

<div class="section-container">
<h2>参加者一覧</h2>

<table>
<thead>
<tr>
<th>名前</th>
<th>ゲームID</th>
<th>Discord</th>
<th>コメント</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

<script>
const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTHixiOhC6gzmJ3AEKZcCLpViLYrHVnmhYVWcx7jFE2vFPumU2JlYxeOTaK961qDY-pIZ0astOepA7-/pub?output=csv";

const formURL =
"https://docs.google.com/forms/d/e/1FAIpQLSc7UaaqyKeuFvl8aKLzBthW9TH4SFIpds0GsrUiDRKcf3G97g/formResponse";

const entryName = "entry.515437798";
const entryGame = "entry.387215603";
const entryDiscord = "entry.1564981895";
const entryComment = "entry.1417704571";

async function fetchData(){
    const res = await fetch(sheetURL);
    const text = await res.text();
    const rows = text.trim().split("\n");

    document.getElementById("count").textContent = rows.length - 1;

    const tbody = document.getElementById("list");
    tbody.innerHTML = "";

    rows.slice(1).reverse().forEach(row=>{
        const cols = row.split(",");
        const tr = document.createElement("tr");

        cols.forEach(col=>{
            const td = document.createElement("td");
            td.textContent = col.replace(/"/g,"");
            tr.appendChild(td);
        });

        tbody.appendChild(tr);
    });
}

async function sendEntry(e){
    e.preventDefault();

    const data = new FormData();
    data.append(entryName, document.getElementById("name").value);
    data.append(entryGame, document.getElementById("gameid").value);
    data.append(entryDiscord, document.getElementById("discord").value);
    data.append(entryComment, document.getElementById("comment").value);

    await fetch(formURL,{
        method:"POST",
        mode:"no-cors",
        body:data
    });

    alert("エントリー完了！");
    document.getElementById("form").reset();
    setTimeout(fetchData,1500);
}

window.onload = fetchData;
setInterval(fetchData,5000);
</script>

</body>
</html>
