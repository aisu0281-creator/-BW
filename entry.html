<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>大会エントリー</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.7;
    background-color: #f8f9fa;
    color: #333;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

h2 {
    color: #1a5a96;
    padding-bottom: 8px;
    border-bottom: 3px solid #2980b9;
    margin-bottom: 20px;
}

.section-container {
    background-color: #ffffff;
    border-radius: 10px;
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: 0.2s;
}

.section-container:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
}

/* ホームボタン復活 */
.home-btn{
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 10px 15px;
    background-color: #4CAF50;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

.home-btn:hover{
    background-color: #45a049;
}

.form-row {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
}

.form-row label {
    width: 120px;
    font-weight: bold;
}

.form-row input {
    flex: 1;
    max-width: 400px;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    padding: 10px 20px;
    background-color: #2980b9;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover { background-color: #1f6391; }

.delete-btn { background:#e74c3c; }
.delete-btn:hover { background:#c0392b; }

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<a href="index.html" class="home-btn">ホームに戻る</a>

<h1>◆大会エントリー</h1>

<div class="section-container">
<h2>現在の参加人数：<span id="count">0</span>人</h2>
</div>

<div class="section-container">
<h2>エントリーフォーム</h2>

<form id="form">
<div class="form-row">
<label>名前：</label>
<input id="name" required>
</div>

<div class="form-row">
<label>ゲームID：</label>
<input id="gameid" required>
</div>

<div class="form-row">
<label>Discord：</label>
<input id="discord" required>
</div>

<div class="form-row">
<label>コメント：</label>
<input id="comment">
</div>

<button type="submit">エントリーする</button>
</form>
</div>

<div class="section-container">
<h2>参加者一覧</h2>
<table>
<thead>
<tr>
<th>名前</th>
<th>ゲームID</th>
<th>Discord</th>
<th>コメント</th>
<th>削除</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<script>
const sheetURL = "（そのまま今のURL）";
const formURL = "（そのまま今のURL）";

fetchData();

async function fetchData(){
    const res = await fetch(sheetURL);
    const text = await res.text();
    const rows = text.trim().split("\n");

    const tbody = document.getElementById("list");
    tbody.innerHTML = "";
    let count = 0;

    rows.slice(1).reverse().forEach(row=>{
        const cols = row.split(",");
        if(cols[5] === "削除済み") return;
        count++;

        const tr = document.createElement("tr");
        for(let i=1;i<=4;i++){
            const td = document.createElement("td");
            td.textContent = cols[i];
            tr.appendChild(td);
        }
        tbody.appendChild(tr);
    });

    document.getElementById("count").textContent = count;
}
</script>

</body>
